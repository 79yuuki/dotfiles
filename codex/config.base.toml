# Portable global Codex settings.
# This file is version-controlled and should contain only machine-portable config.
# Runtime state such as project trust or UI hints belongs in ~/.codex/config.toml.

model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"

[plugins."github@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true
